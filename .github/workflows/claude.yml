name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Project Setup (CUSTOMIZED FOR YOU)
      - name: Project Setup
        run: |
          npm install

      # ✅ Run Claude
      - name: Run Claude
        uses: anthropic/claude-code-action@latest
        with:
          custom_instructions: |
            This is a Node.js Express project.
            The app runs using `node index.js`.
            There is currently no database.
            The server is NOT running beforehand.
            Focus on adding simple APIs and clean structure.

          allowed_tools: "Bash(npm:*),Bash(node:*)"