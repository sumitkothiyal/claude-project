name: Claude Assistant

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run Claude
        uses: anthropics/claude-code-action@main
        with:
          custom_instructions: |
            This is a simple Node.js Express project.
            The app runs using `node index.js`.
            There is no database.
            Focus on adding simple APIs and clean structure.

          allowed_tools: "Bash(npm:*),Bash(node:*)"